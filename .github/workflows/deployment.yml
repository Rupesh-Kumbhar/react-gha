name: Deploy
run-name: "Deploy : ${{inputs.build_id}} "
on:
  workflow_dispatch:
    inputs:
      build_id:
        description: 'Build ID'
        required: true
        type: string
      branch_name:
        description: 'Branch name to deploy from'
        required: true
        type: string


jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch_name }}

      - name: List repository artifacts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          sudo apt-get update && sudo apt-get install -y jq
          echo "Listing artifacts for repository: ${GITHUB_REPOSITORY}"
          curl -s -H "Authorization: token $GITHUB_TOKEN" "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/artifacts" | jq -r '.artifacts[] | "id:\(.id) name:\(.name) expired:\(.expired)"' || true

      - name: Download build artifacts (API)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ARTIFACT_NAME: build-${{ inputs.build_id }}
        run: |
          sudo apt-get update && sudo apt-get install -y jq unzip
          echo "Searching for artifact: $ARTIFACT_NAME"
          artifacts_url="https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/artifacts"
          artifact_id=$(curl -s -H "Authorization: token $GITHUB_TOKEN" "$artifacts_url" | jq -r --arg name "$ARTIFACT_NAME" '.artifacts[] | select(.name==$name) | .id' | head -n1)
          if [ -z "$artifact_id" ] || [ "$artifact_id" = "null" ]; then
            echo "Artifact not found: $ARTIFACT_NAME"
            exit 1
          fi
          echo "Found artifact id: $artifact_id"
          download_url="https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/artifacts/${artifact_id}/zip"
          curl -s -H "Authorization: token $GITHUB_TOKEN" -L -o artifact.zip "$download_url"
          unzip -o artifact.zip -d build
          rm artifact.zip


      - name: Verify build artifacts
        run: |
          if [ -d "build" ] && [ "$(ls -A build)" ]; then
            echo "✓ Build artifacts found and ready to deploy"
            ls -la build/
          else
            echo "✗ No build artifacts found"
            exit 1
          fi

      - name: Deploy to hosting
        run: |
          echo "Deploying build: ${{ inputs.build_id }}"
          echo "From branch: ${{ inputs.branch_name }}"
          # Add your deployment commands here
          # Example for static hosting (uncomment and modify):
          # - Deploy to S3: aws s3 sync build/ s3://your-bucket-name/
          # - Deploy to Netlify: netlify deploy --prod --dir=build
          # - Deploy to Vercel: vercel deploy --prod
          echo "Deployment completed!"

      - name: Deployment Summary
        run: |
          echo "========================================="
          echo "Deployment Summary"
          echo "========================================="
          echo "Build ID: ${{ inputs.build_id }}"
          echo "Branch: ${{ inputs.branch_name }}"
          echo "Deployed at: $(date)"
          echo "========================================="
