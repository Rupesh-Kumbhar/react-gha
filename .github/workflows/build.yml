name: Build
on:
  workflow_dispatch:


jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      build_id: ${{ steps.generate-build-id.outputs.build_id }}
    steps:
      - name: Generate Build ID
        id: generate-build-id
        run: echo "build_id=$(date +%s)-$(git rev-parse --short HEAD 2>/dev/null || echo $RANDOM)" >> $GITHUB_OUTPUT

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch_name }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build React app
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ steps.generate-build-id.outputs.build_id }}
          path: build/
          retention-days: 7

      - name: Output Build Info
        run: |
          echo "Build completed successfully!"
          echo "Build ID: ${{ steps.generate-build-id.outputs.build_id }}"
          echo "Branch: ${{ inputs.branch_name }}"