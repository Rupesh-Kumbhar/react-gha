name: Build
run-name: "Build : ${{github.ref_name}}_{{github.build_id}} "
on:
  workflow_dispatch:


jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      build_id: ${{ steps.generate-build-id.outputs.build_id }}
    steps:
      - name: Generate Build ID
        id: generate-build-id
        run: |
          BRANCH=${GITHUB_REF#refs/heads/}
          BRANCH=${BRANCH//\//-}
          echo "build_id=${BRANCH}_$(date +%s)" >> $GITHUB_OUTPUT

      - name: Set workflow run name
        if: always()
        env:
          BUILD_ID: ${{ steps.generate-build-id.outputs.build_id }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -s -X PATCH \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            https://api.github.com/repos/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID \
            -d "{\"name\":\"$BUILD_ID\"}"

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch_name }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build React app
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ steps.generate-build-id.outputs.build_id }}
          path: build/
          retention-days: 7

      - name: Output Build Info
        run: |
          echo "Build completed successfully!"
          echo "Build ID: ${{ steps.generate-build-id.outputs.build_id }}"
          echo "Branch: ${{ inputs.branch_name }}"